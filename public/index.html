<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maxwell CPA Review — Review Rewards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f5f5f3;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1rem 4rem;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 2rem;
    }
    .logo-mark {
      width: 36px;
      height: 36px;
      background: #1a3a5c;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 500;
      font-size: 14px;
    }
    .logo-name { font-size: 15px; font-weight: 500; }
    .card {
      background: #fff;
      border: 1px solid #e5e5e2;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 500px;
    }
    h1 {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 14px;
      color: #555;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .links a {
      display: block;
      padding: 12px 16px;
      background: #1a3a5c;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      text-align: center;
      transition: background 0.15s;
    }
    .links a:hover { background: #14304e; }
    .links a span {
      display: block;
      font-size: 12px;
      font-weight: 400;
      opacity: 0.85;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-mark">M</div>
    <span class="logo-name">Maxwell CPA Review</span>
  </div>
  <div class="card">
    <h1>Review rewards</h1>
    <p>Select your 101 course to leave a Google review and unlock your free resource.</p>
    <div class="links">
      <a href="/far101/">FAR 101<span>FAR Baseline Exam</span></a>
      <a href="/aud101/">AUD 101<span>AUD Exam Textbook</span></a>
      <a href="/reg101/">REG 101<span>REG Exam Textbook</span></a>
    </div>
  </div>
</body>
</html>
